<!DOCTYPE html>
<html lang="en">
<head><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dwarrek Designs</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0d0d0d;
  color: #fff;
}

/* Navbar */
header {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  position: sticky;
  top: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
}

.logo {
  font-weight: bold;
}

/* Hero */
.hero {
  height: 90vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 40px;
}

.hero h1 {
  font-size: 60px;
  max-width: 600px;
}

.hero p {
  color: #aaa;
  margin-top: 10px;
}

.btn {
  margin-top: 20px;
  padding: 12px 25px;
  background: white;
  color: black;
  border: none;
  cursor: pointer;
}

/* Section */
.section {
  padding: 80px 40px;
}

.section h2 {
  margin-bottom: 30px;
}

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
  gap: 20px;
}

/* Portfolio Card */
.card {
  overflow: hidden;
  border-radius: 10px;
}

.card img {
  width: 100%;
  height: 250px;
  object-fit: cover;
  transition: 0.5s;
}

.card:hover img {
  transform: scale(1.1);
}

/* Services */
.service {
  background: #1a1a1a;
  padding: 30px;
  border-radius: 10px;
}

/* Footer */
footer {
  text-align: center;
  padding: 30px;
  color: #777;
}

/* WhatsApp */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  padding: 15px;
  border-radius: 50%;
  color: white;
  text-decoration: none;
}
</style>
</head>

<body>

<header>
  <div class="logo">Dwarrek Designs</div>
  <div>Luxury Interiors</div>
</header>

<section class="hero">
  <h1>Transforming Spaces Into Luxury Living</h1>
  <p>Minimal • Elegant • Functional Designs</p>
  <button class="btn">Book Consultation</button>
</section>

<section class="section">
  <h2>Our Work</h2>
  <div class="grid">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c">
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1618221195710-dd6b41faaea6">
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1600607687920-4e2a09cf159d">
    </div>

  </div>
</section>

<section class="section">
  <h2>Services</h2>
  <div class="grid">
    <div class="service">Interior Design</div>
    <div class="service">3D Visualization</div>
    <div class="service">Space Planning</div>
  </div>
</section>

<section class="section">
  <h2>About</h2>
  <p style="max-width:600px; color:#aaa;">
    Dwarrek Designs creates elegant and modern spaces that reflect your personality.
  </p>
</section>

<footer>
  © 2026 Dwarrek Designs
</footer>

<a class="whatsapp" href="https://wa.me/918487022712">
  <i class="fa-brands fa-whatsapp"></i>
</a>

</body>
</html>
